<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Cruz Plamondon</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="stylesheets/main.css" />

    <style>
      .lab-matrix-body {
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: #141414 !important;
      }
      #fluid-404 {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      .lab-overlay {
        position: absolute;
        top: 4rem;
        left: 4rem;
        z-index: 10;
        pointer-events: none;
      }
      .lab-title {
        font-family: "Bebas Neue", serif;
        font-size: clamp(4rem, 6vw, 8rem);
        color: #ffffff;
        line-height: 0.9;
        margin: 0;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
      }
      .lab-status {
        font-family: "Inter", sans-serif;
        font-weight: 800;
        font-size: 1.4rem;
        color: var(--accent-color);
        letter-spacing: 2px;
        margin-top: 1rem;
      }
      .btn-exit-lab {
        position: absolute;
        bottom: 4rem;
        left: 4rem;
        pointer-events: auto;
        border-color: rgba(255, 255, 255, 0.2) !important;
        background: transparent !important;
        color: #ffffff !important;
        z-index: 10;
      }
      .btn-exit-lab:hover {
        background: #ffffff !important;
        color: #000000 !important;
      }
    </style>

    <script>
      if (localStorage.getItem("system-theme") === "dark") {
        document.documentElement.classList.add("dark-mode");
      }
    </script>
  </head>
  <body class="lab-matrix-body">
    <canvas id="fluid-404"></canvas>

    <div class="lab-overlay">
      <h1 class="lab-title">404<br />NOT FOUND</h1>
      <div class="lab-status">[ REQUESTED ROUTE: UNRESOLVED ]</div>
    </div>

    <a href="index.html" class="badge btn-exit-lab no-underline"
      >&larr; RETURN TO HOME</a
    >

    <script src="JavaScripts/scripts.js"></script>
  </body>
</html>
