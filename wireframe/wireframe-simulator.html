    <style>
      /* --- 1. SYSTEM VARIABLES (LIGHT MODE DEFAULT) --- */
      :root {
        --wf-bg: #eaddd5;
        --wf-surface: #ffffff;
        --wf-terminal: #212529;
        --wf-image: #9ca3af;
        --wf-text-dark: #1a1a1a;
        --wf-text-light: #d1d5db;
        --wf-border: #1a1a1a;
        --wf-accent: #d93829;
      }

      /* --- 2. DARK MODE OVERRIDES --- */
      body.dark-mode {
        --wf-bg: #0d0d0d;
        --wf-surface: #333333; /* Upgraded to a lighter grey for high visibility */
        --wf-terminal: #eaddd5;
        --wf-image: #4b4b4b;
        --wf-text-dark: #eaddd5;
        --wf-text-light: #555555;
        --wf-border: #444444;
      }

      /* --- 3. RESET & SIMULATOR UI --- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #111;
        font-family: monospace;
        padding: 6rem 2rem 4rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8rem;
        transition: background 0.3s ease;
      }

      /* Fixed Control Panel */
      .controls {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: #000;
        padding: 1rem 2rem;
        display: flex;
        justify-content: center;
        gap: 1rem;
        z-index: 9999;
        border-bottom: 2px solid #333;
      }
      .controls button {
        padding: 0.8rem 1.5rem;
        font-family: monospace;
        font-weight: bold;
        cursor: pointer;
        background: #333;
        color: #fff;
        border: 1px solid #555;
        transition: all 0.2s ease;
      }
      .controls button:hover {
        background: var(--wf-accent);
        border-color: var(--wf-accent);
      }

      /* --- 4. WIREFRAME ARCHITECTURE --- */
      .wireframe-page {
        background: var(--wf-bg);
        width: 100%;
        max-width: 1200px;
        border: 2px solid var(--wf-border);
        position: relative;
        transition:
          max-width 0.4s cubic-bezier(0.25, 1, 0.5, 1),
          background 0.3s ease,
          border 0.3s ease;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      }

      /* Mobile Morph Override */
      .wireframe-page.is-mobile {
        max-width: 400px;
      }

      /* Massive Page Identifier */
      .page-identifier {
        background: var(--wf-accent);
        color: #ffffff;
        padding: 1rem 3rem;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-bottom: 2px solid var(--wf-border);
      }

      /* --- 5. SKELETON BLOCKS --- */
      .skel-line {
        background: var(--wf-text-light);
        height: 12px;
        margin-bottom: 8px;
        border-radius: 2px;
        transition: background 0.3s;
      }
      .skel-line.dark {
        background: var(--wf-text-dark);
      }
      .w-20 {
        width: 20%;
      }
      .w-30 {
        width: 30%;
      }
      .w-40 {
        width: 40%;
      }
      .w-60 {
        width: 60%;
      }
      .w-80 {
        width: 80%;
      }
      .w-100 {
        width: 100%;
      }

      .skel-heading {
        background: var(--wf-text-dark);
        height: 60px;
        margin-bottom: 1rem;
        transition: background 0.3s;
      }
      .skel-heading-sm {
        background: var(--wf-text-dark);
        height: 30px;
        width: 50%;
        margin-bottom: 1rem;
        transition: background 0.3s;
      }
      .skel-num {
        font-size: 5rem;
        color: var(--wf-text-dark);
        font-weight: bold;
        line-height: 1;
        transition: color 0.3s;
      }

      /* --- 6. GRID SYSTEMS (DESKTOP) --- */
      .grid-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.5rem 3rem;
        border-bottom: 1px solid var(--wf-border);
      }
      .nav-skeleton {
        display: flex;
        gap: 1.5rem;
      }
      .nav-skeleton div {
        width: 50px;
        height: 10px;
        background: var(--wf-text-dark);
      }

      .grid-hero {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4rem;
        padding: 6rem 3rem;
        border-bottom: 1px solid var(--wf-border);
        position: relative;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4rem;
        padding: 4rem 3rem;
        border-bottom: 1px solid var(--wf-border);
      }
      .grid-bento {
        display: grid;
        grid-template-columns: 100px 1fr;
        gap: 2rem;
        padding: 3rem;
        border-bottom: 1px solid var(--wf-border);
      }

      /* --- 7. GRID SYSTEMS (MOBILE OVERRIDES) --- */
      .is-mobile .grid-hero,
      .is-mobile .grid-2,
      .is-mobile .grid-bento {
        grid-template-columns: 1fr;
        padding: 3rem 1.5rem;
        gap: 2rem;
      }
      .is-mobile .reverse-row {
        display: flex;
        flex-direction: column-reverse;
      }
      .is-mobile .nav-skeleton {
        display: none;
      }
      .is-mobile .skel-num {
        font-size: 3rem;
      }

      /* --- 8. UI COMPONENTS --- */
      .wf-accent-block {
        background: var(--wf-accent);
        position: absolute;
        right: 0;
        top: 0;
        height: 100%;
        width: 40%;
        z-index: 1;
        transition: width 0.3s;
      }
      .is-mobile .wf-accent-block {
        width: 10px;
        left: 0;
        height: 100%;
        top: 0;
      }

      .wf-terminal {
        background: var(--wf-terminal);
        padding: 3rem 2rem;
        border: 1px solid var(--wf-border);
        position: relative;
        z-index: 2;
        transition: background 0.3s;
      }
      .dark-mode .wf-terminal .skel-line.dark {
        background: #1a1a1a;
      }

      .wf-image-box {
        background: var(--wf-image);
        aspect-ratio: 4/3;
        border: 1px solid var(--wf-border);
        transition: background 0.3s;
      }
      .wf-sandbox {
        background: var(--wf-surface);
        padding: 3rem;
        border: 1px solid var(--wf-border);
        height: 100%;
        transition: background 0.3s;
      }
      .wf-scroll-btn {
        width: 60px;
        height: 60px;
        background: var(--wf-accent);
        margin-top: 2rem;
        border: 1px solid var(--wf-border);
      }
      .wf-cta-banner {
        background: var(--wf-surface);
        padding: 6rem 3rem;
        border-bottom: 1px solid var(--wf-border);
        text-align: center;
        transition: background 0.3s;
      }

      .wf-input {
        height: 50px;
        background: var(--wf-surface);
        border: 1px solid var(--wf-border);
        margin-bottom: 1.5rem;
        transition: background 0.3s;
      }
      .wf-textarea {
        height: 150px;
        background: var(--wf-surface);
        border: 1px solid var(--wf-border);
        margin-bottom: 1.5rem;
        transition: background 0.3s;
      }
      .wf-submit {
        height: 60px;
        background: var(--wf-text-dark);
        width: 100%;
        transition: background 0.3s;
      }

      /* Accurate 2-Column Footer */
      .wf-footer {
        padding: 4rem 3rem;
        background: var(--wf-bg);
        transition: background 0.3s;
      }
      .wf-footer-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4rem;
        margin-bottom: 3rem;
      }
      .is-mobile .wf-footer-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .wf-footer-bottom {
        border-top: 1px solid var(--wf-border);
        padding-top: 2rem;
        display: flex;
        justify-content: center;
      }
    </style>

          style="padding: 0; border: none; gap: 2rem; margin-bottom: 2rem">
          <div class="wf-input"></div>
          <div class="wf-input"></div>
        </div>
        <div class="wf-textarea"></div>
        <div class="wf-submit"></div>
      </div>

      <div class="wf-footer">
        <div class="wf-footer-grid">
          <div>
            <div class="skel-line w-30 dark"></div>
            <div class="skel-line w-30 dark"></div>
            <div class="skel-line w-30 dark"></div>
            <div style="height: 2rem"></div>
            <div class="skel-line w-20 dark"></div>
            <div class="skel-line w-20 dark"></div>
          </div>
          <div>
            <div class="skel-heading-sm w-60"></div>
            <div class="skel-line w-100"></div>
            <div class="skel-line w-80"></div>
          </div>
        </div>
        <div class="wf-footer-bottom">
          <div class="skel-line w-40 dark"></div>
        </div>
      </div>
    </div>

    <script>
      const btnMobile = document.getElementById("toggle-mobile");
      const btnDark = document.getElementById("toggle-dark");
      const pages = document.querySelectorAll(".wireframe-page");
      const body = document.body;

      btnMobile.addEventListener("click", () => {
        let isMobile = false;
        pages.forEach((page) => {
          page.classList.toggle("is-mobile");
          if (page.classList.contains("is-mobile")) isMobile = true;
        });
        btnMobile.innerText = isMobile
          ? "SWITCH TO DESKTOP VIEW"
          : "TOGGLE MOBILE VIEW";
        btnMobile.style.background = isMobile ? "var(--wf-accent)" : "#333";
      });

      btnDark.addEventListener("click", () => {
        body.classList.toggle("dark-mode");
        const isDark = body.classList.contains("dark-mode");
        btnDark.innerText = isDark
          ? "SWITCH TO LIGHT MODE"
          : "TOGGLE DARK MODE";
        btnDark.style.background = isDark ? "var(--wf-accent)" : "#333";
      });
    </script>
  </body>
</html>
